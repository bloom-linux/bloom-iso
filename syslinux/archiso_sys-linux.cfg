LABEL arch
TEXT HELP
Boot Bloom live medium (BIOS).
ENDTEXT
MENU LABEL Bloom (%ARCH%)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 vt.global_cursor_default=0 rd.udev.log_level=3

LABEL archspeech
TEXT HELP
Boot Bloom live medium (BIOS) with speech.
ENDTEXT
MENU LABEL Bloom (%ARCH%) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
