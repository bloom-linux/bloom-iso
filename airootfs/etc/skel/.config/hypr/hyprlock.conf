general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.015
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# Dark tint over blurred screenshot
shape {
    monitor =
    size = 3840, 2160
    color = rgba(0d061877)
    rounding = 0
    border_size = 0
    position = 0, 0
    halign = center
    valign = center
}

# Bloom logo
image {
    monitor =
    path = /usr/share/pixmaps/bloom-white.png
    size = 100
    rounding = -1
    position = 0, 230
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(00000055)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%-H:%M")</b>"
    color = rgba(f0eef4ff)
    font_size = 88
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 90
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000055)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = rgba(f0eef4bb)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(00000044)
}

# Input field
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.27
    dots_spacing = 0.31
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(b0182855)
    inner_color = rgba(0d0618dd)
    font_color = rgba(f0eef4ff)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = true
    fade_timeout = 1200
    placeholder_text = <span foreground="##88809A">  Enter password</span>
    hide_input = false
    rounding = 14
    check_color = rgba(b01828ff)
    fail_color = rgba(ff5555ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(ffaa00ff)
    position = 0, -90
    halign = center
    valign = center
}

# Username hint
label {
    monitor =
    text =   $USER
    color = rgba(88809acc)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -158
    halign = center
    valign = center
}
