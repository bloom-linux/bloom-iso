background {
    monitor =
    color = rgba(0d0618ff)
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.2
}

image {
    monitor =
    path = /usr/share/pixmaps/bloom-white.png
    size = 120
    rounding = -1
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(b0182840)
    inner_color = rgba(180828e6)
    font_color = rgba(f0eef4ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##88809A">Password...</span>
    hide_input = false
    check_color = rgba(b01828ff)
    fail_color = rgba(ff4444ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(ffaa00ff)
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(f0eef4ff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(88809aff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 130
    halign = center
    valign = center
}
