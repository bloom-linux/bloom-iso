env = XDG_SESSION_TYPE,wayland
env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Vanilla-DMZ-AA
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland

monitor=,highrr,auto,1

workspace = w[t1], gapsin:4, gapsout:60 8 8 8
workspace = w[t2], gapsin:4, gapsout:60 8 8 8
workspace = w[t3], gapsin:4, gapsout:60 8 8 8
workspace = w[t4], gapsin:4, gapsout:60 8 8 8

cursor {
    no_hardware_cursors = true
}

input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    natural_scroll = true
  }
}

decoration {
  rounding = 14
  blur {
    enabled = true
    size = 4
    passes = 1
    ignore_opacity = false
    xray = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  bezier = overshot, 0.05, 0.9, 0.1, 1.1
  animation = windows, 1, 5, overshot, slide
  animation = workspaces, 1, 6, default, slidevert
  animation = layers, 1, 4, default, fade
}

misc {
  background_color = rgb(0d0618)
}

$mainMod = SUPER
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, bloom-power
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, E, exec, thunar
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, A, exec, bloom-volume
bind = $mainMod, W, exec, bloom-network
bind = $mainMod, B, exec, bloom-brightness

# Volume keys
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Brightness keys
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

windowrule {
    name = bloom-volume
    match:class = bloom.volume
    float = true
    move = 100%-316 56
    size = 300 420
    border_size = 0
    no_shadow = true
}

windowrule {
    name = bloom-brightness
    match:class = bloom.brightness
    float = true
    move = 100%-316 56
    size = 300 140
    border_size = 0
    no_shadow = true
}

windowrule {
    name = bloom-calendar
    match:class = bloom.calendar
    float = true
    move = 100%-360 56
    size = 340 380
    border_size = 0
    no_shadow = true
}

windowrule {
    name = bloom-network
    match:class = bloom.network
    float = true
    move = 100%-360 56
    size = 340 500
    border_size = 0
    no_shadow = true
}

windowrule {
    name = bloom-power
    match:class = bloom.power
    float = true
    move = 100%-260 56
    size = 240 280
    border_size = 0
    no_shadow = true
}

windowrule {
    name = bloom-firstrun
    match:class = bloom-firstrun
    float = true
    center = true
    size = 760 520
}

windowrule {
    name = bloom-settings
    match:class = bloom.settings
    size = 1060 720
}

windowrule {
    name = bloom-install
    match:class = bloom-install
    float = true
    center = true
    size = 620 580
}

exec-once = swaync
exec-once = swaybg -i /usr/share/wallpapers/bloom/bloom-wallpaper.png -m fill
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = bloom-generate-colors --no-reload
exec-once = bloom-generate-icons
exec-once = bloom-generate-cursors
exec-once = sleep 2 && bloom-island
exec-once = sleep 3 && bloom-firstrun
exec-once = blueman-applet
exec-once = swayosd-server
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = xdg-user-dirs-update
