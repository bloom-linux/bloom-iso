# Load common GPU DRM drivers early so Plymouth can initialize its display
# on real hardware (i915=Intel, amdgpu=AMD, nouveau=NVIDIA open, virtio/vmwgfx=VMs)
MODULES=(i915 amdgpu nouveau radeon virtio_gpu vmwgfx)
HOOKS=(base udev microcode modconf kms plymouth memdisk archiso archiso_loop_mnt block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
