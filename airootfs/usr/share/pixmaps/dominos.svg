<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000025"/>
    </filter>
  </defs>

  <g transform="rotate(-45, 50, 50)" filter="url(#shadow)">

    <!-- Tile body — taller -->
    <rect x="22" y="4" width="56" height="92" rx="10" ry="10" fill="#f5f5f7"/>
    <rect x="22" y="4" width="56" height="92" rx="10" ry="10"
          fill="none" stroke="#d1d1d6" stroke-width="1"/>

    <!-- Dividing line -->
    <line x1="33" y1="50" x2="67" y2="50" stroke="#d1d1d6" stroke-width="1"/>

    <!-- Top half: 5 dots (corners + center) -->
    <circle cx="35" cy="19" r="4" fill="#1c1c1e"/>
    <circle cx="65" cy="19" r="4" fill="#1c1c1e"/>
    <circle cx="50" cy="33" r="4" fill="#1c1c1e"/>
    <circle cx="35" cy="43" r="4" fill="#1c1c1e"/>
    <circle cx="65" cy="43" r="4" fill="#1c1c1e"/>

    <!-- Bottom half: OS -->
    <text x="50" y="80"
          font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="17"
          font-weight="700"
          fill="#1c1c1e"
          text-anchor="middle"
          letter-spacing="1">OS</text>

  </g>
</svg>
