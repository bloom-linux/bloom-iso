general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    noise = 0.015
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# Dim overlay
shape {
    monitor =
    size = 2000, 2000
    color = rgba(0d061888)
    rounding = 0
    border_size = 0
    position = 0, 0
    halign = center
    valign = center
}

# Clock — large center
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%-H:%M")</b>"
    color = rgba(f0eef4ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000088)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = rgba(f0eef4cc)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 56
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(00000066)
}

# Input field
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(b0182860)
    inner_color = rgba(0d0618cc)
    font_color = rgba(f0eef4ff)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##88809A">  Enter password</span>
    hide_input = false
    rounding = 12
    check_color = rgba(b01828ff)
    fail_color = rgba(ff5555ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(ffaa00ff)
    position = 0, -80
    halign = center
    valign = center
}

# Hint below input
label {
    monitor =
    text =   $USER
    color = rgba(88809acc)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -148
    halign = center
    valign = center
}
